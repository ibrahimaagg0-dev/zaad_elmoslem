 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - زاد المسلم</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --bg: #f4f7f5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #2d312e;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
            padding: 25px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 { margin: 0; font-size: 1.8rem; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; font-size: 0.95rem; }
        
        .container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            float: right;
        }
        .btn-open-pdf {
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px auto;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .btn-open-pdf:hover {
            background-color: var(--primary);
        }
        .pdf-viewer-container {
            width: 100%;
            height: 75vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--accent);
            margin-top: 10px;
            background: #fff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .note {
            font-size: 0.9rem;
            color: #666;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>المصحف الشريف كَامِلاً</h2>
        <p>زاد المسلم - تصفح وقراءة القرآن الكريم بخط واضح</p>
    </div>

    <div class="container">
        <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>
        <div style="clear: both;"></div>

        <a href="quran.pdf" target="_blank" class="btn-open-pdf">📖 اضغط هنا لفتح المصحف في شاشة كاملة</a>

        <div class="pdf-viewer-container">
            <iframe src="quran.pdf"></iframe>
        </div>

        <p class="note">
            💡 <b>تنويه مريح:</b> تصفح المصحف مباشرة من المربع بالأعلى، أو اضغط على الزر الأخضر الكبير لفتح المصحف في صفحة مستقلة كاملة لتكبير الحروف والقراءة براحتك وبأعلى جودة.
        </p>
    </div>

</body>
</html>
