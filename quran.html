        const loading = document.getElementById('loading');

        // لو القائمة لسه مفيهاش السور كاملة بنفرشهم
        if(surahSelector.options.length <= 12) {
            fetch('https://api.alquran.cloud/v1/surah')
                .then(res => res.json())
                .then(data => {
                    if(data.code === 200) {
                        surahSelector.innerHTML = '<option value="">اختر السورة...</option>';
                        data.data.forEach(surah => {
                            let option = document.createElement('option');
                            option.value = surah.number;
                            option.textContent = ${surah.number}. سورة ${surah.name};
                            surahSelector.appendChild(option);
                        });
                    }
                }).catch(() => {});
        }

        function loadSurah(surahNumber) {
            if(!surahNumber) { quranView.style.display = 'none'; return; }
            loading.style.display = 'block';
            quranView.style.display = 'none';

            fetch(https://api.alquran.cloud/v1/surah/${surahNumber})
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    if(data.code === 200) {
                        quranView.style.display = 'block';
                        let verses = data.data.verses;
                        let fullText = "";

                        if(surahNumber == 1 || surahNumber == 9) { bismillahText.style.display = 'none'; } 
                        else { bismillahText.style.display = 'block'; }

                        verses.forEach((ayah, index) => {
                            let text = ayah.text;
                            if(surahNumber != 1 && index === 0 && text.startsWith("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ")) {
                                text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                            }
                            fullText += text +  <span class="ayah-num">﴿${ayah.numberInSurah}﴾</span> ;
                        });
                        surahTextContent.innerHTML = fullText;
                    }
                }).catch(() => { loading.style.display = 'none'; alert("تأكد من اتصالك بالإنترنت لتحميل الآيات."); });
        }
