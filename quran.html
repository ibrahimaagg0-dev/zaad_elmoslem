<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - زاد المسلم</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --bg: #f4f7f5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #2d312e;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
            padding: 25px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 { margin: 0; font-size: 1.8rem; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; font-size: 0.95rem; }
        
        .container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            float: right;
        }
        
        /* كارت القراءة المخصص للموبايل */
        .mobile-book-card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 30px auto;
            border-top: 5px solid var(--accent);
        }
        .book-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .btn-open-pdf {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
            margin-top: 15px;
        }
        
        /* إطار عرض الـ PDF المخصص للشاشات الكبيرة */
        .pdf-viewer-container {
            width: 100%;
            height: 75vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--accent);
            margin-top: 20px;
            background: #fff;
            display: block; /* يظهر على الكمبيوتر */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 📱 حركة الـ CSS السحرية للموبايل */
        @media (max-width: 768px) {
            .pdf-viewer-container {
                display: none; /* إخفاء المربع الفاضي تماماً على الموبايل */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>المصحف الشريف كَامِلاً</h2>
        <p>زاد المسلم - تصفح وقراءة القرآن الكريم</p>
    </div>

    <div class="container">
        <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>
        <div style="clear: both;"></div>

        <div class="mobile-book-card">
            <div class="book-icon">📖</div>
            <h3>تصفح المصحف الشريف كاملاً</h3>
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 20px;">اضغط على الزر أدناه لفتح نسخة المصحف الشريف عالية الجودة، متاح التكبير والقراءة الليلية وسلسة التنقل.</p>
            <a href="quran.pdf" class="btn-open-pdf">اضغط هنا لبدء القراءة الفورية</a>
        </div>

        <div class="pdf-viewer-container">
            <iframe src="quran.pdf"></iframe>
        </div>
    </div>

</body>
</html>
