<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - زاد المسلم</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --bg: #f4f7f5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #2d312e;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
            padding: 30px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 { margin: 0; font-size: 1.8rem; }
        
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .quran-card {
            background: white;
            padding: 35px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
            border-top: 5px solid var(--accent);
        }
        .btn-open {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.25rem;
            display: block;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>المصحف الشريف كاملاً</h2>
    </div>

    <div class="container">
        <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>

        <div class="quran-card">
            <div style="font-size: 4rem; margin-bottom: 15px;">📖</div>
            <h3>تصفح المصحف بدون إنترنت</h3>
            <p style="color: #666; font-size: 0.95rem; line-height: 1.6;">اضغط على الزر بالأسفل لفتح المصحف الشريف مباشرة من ذاكرة جهازك، يمكنك تصفحه وقراءته في أي وقت وأي مكان دون الحاجة لشبكة.</p>
            
            <a href="quran.pdf" target="_blank" class="btn-open">قراءة القرآن الكريم ⚡</a>
        </div>
    </div>

</body>
</html>
