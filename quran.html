<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f5; }
        select { width: 100%; padding: 15px; font-size: 1.2rem; margin-bottom: 20px; border-radius: 10px; }
        #output { background: white; padding: 20px; border-radius: 10px; min-height: 100px; }
        .ayah { line-height: 2; font-size: 1.5rem; }
    </style>
</head>
<body>

    <select id="s" onchange="getAyat(this.value)">
        <option value="">اختر السورة...</option>
        <option value="1">1. الفاتحة</option>
        <option value="36">36. يس</option>
        <option value="112">112. الإخلاص</option>
    </select>

    <div id="output">انتظر اختيار السورة...</div>

    <script>
        function getAyat(num) {
            if(!num) return;
            const div = document.getElementById('output');
            div.innerHTML = "جاري التحميل... (تأكد من النت)";
            
            fetch('https://api.alquran.cloud/v1/surah/' + num)
                .then(r => r.json())
                .then(d => {
                    let text = "";
                    d.data.verses.forEach(v => { text += v.text + " "; });
                    div.innerHTML = <p class='ayah'>${text}</p>;
                })
                .catch(e => { div.innerHTML = "خطأ في الاتصال بالسيرفر. جرب مرة أخرى."; });
        }
    </script>
</body>
</html>
