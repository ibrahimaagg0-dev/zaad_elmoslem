<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - زاد المسلم</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --bg: #f4f7f5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #2d312e;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            text-align: center;
            padding: 25px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h2 { margin: 0; font-size: 1.8rem; }
        
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
        .mobile-book-card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 20px auto;
            border-top: 5px solid var(--accent);
        }
        .btn-open-pdf {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            text-decoration: none;
            padding: 16px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin: 15px auto;
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
        }
        .btn-secondary {
            background: #fff;
            color: #2d6a4f;
            border: 2px solid #2d6a4f;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>المصحف الشريف كَامِلاً</h2>
    </div>

    <div class="container">
        <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>

        <div class="mobile-book-card">
            <div style="font-size: 3.5rem; margin-bottom: 10px;">📖</div>
            <h3>قراءة القرآن الكريم كاملاً</h3>
            <p style="color: #666; font-size: 0.9rem;">تصفح المصحف الشريف الآن من خلال السيرفر المباشر أو قم بتحميل ملفك الخاص.</p>
            
            <a href="quran.pdf" target="_blank" class="btn-open-pdf">📥 الزر الأول: فتح مصحفك الخاص</a>
            
            <a href="https://archive.org/download/Quran-Pdf/quran.pdf" target="_blank" class="btn-open-pdf btn-secondary">⚡ الزر الثاني: سيرفر خارجي سريع ومضمون</a>
        </div>
    </div>

</body>
</html>
